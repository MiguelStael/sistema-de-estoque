services:
  db:
    image: postgres:17.6-alpine
    container_name: sistema-estoque-db
    restart: always
    environment:
      POSTGRES_DB: sistema_estoque
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-8118}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sistema_estoque"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sistema-estoque-app
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sistema_estoque
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-8118}
      JWT_SECRET: ${JWT_SECRET:-3D7F2A9C1E6B4F8D0A5C3E7F9B1D4A6C8E0F2B4D6A8C0E2F4B6D8A0C2E4F6B8}
      UPLOAD_DIR: /app/uploads/images
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
