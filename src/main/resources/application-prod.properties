# PERFIL DE PRODUCAO (DOCKER)
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:sistema_estoque}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# HIBERNATE / JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# LOGGING (PRODUCAO)
logging.level.root=INFO
logging.level.com.estoque.sistema=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# JWT (SECRET VIA ENV)
app.jwt.secret=${JWT_SECRET:3D7F2A9C1E6B4F8D0A5C3E7F9B1D4A6C8E0F2B4D6A8C0E2F4B6D8A0C2E4F6B8}

# UPLOADS
app.upload.dir=/app/uploads/images
