# SERVER
server.port=8080
server.address=0.0.0.0
server.error.include-message=always

# DATASOURCE
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sistema_estoque}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:8118}
spring.datasource.driver-class-name=org.postgresql.Driver

# HIKARI CONNECTION POOL
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# FILE UPLOAD
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:./uploads/images}

# LOGGING
logging.level.root=INFO
logging.level.com.estoque.sistema=INFO

# JACKSON
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# JWT
app.jwt.secret=${JWT_SECRET:3D7F2A9C1E6B4F8D0A5C3E7F9B1D4A6C8E0F2B4D6A8C0E2F4B6D8A0C2E4F6B8}
app.jwt.expiration-ms=86400000

# ACTUATOR & METRICS (PROMETHEUS)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# HIBERNATE ENVERS (AUDIT)
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_historico
spring.jpa.properties.org.hibernate.envers.revision_table_name=revisao
spring.jpa.properties.org.hibernate.envers.revision_field_name=id
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=revtype
spring.jpa.properties.org.hibernate.envers.modified_column_name=status_modificacao
hibernate.envers.revision_timestamp_field_name=timestamp

# LOGGING ESTRUTURADO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# SEGURANCA CORS
app.cors.allowed-origin-patterns=http://localhost:[*],http://127.0.0.1:[*],http://192.168.*.[*]