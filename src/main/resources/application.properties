# SERVER
server.port=8080
server.address=0.0.0.0
server.error.include-message=always

# DATASOURCE
spring.datasource.url=jdbc:postgresql://localhost:5432/sistema_estoque
spring.datasource.username=postgres
spring.datasource.password=8118
spring.datasource.driver-class-name=org.postgresql.Driver

# HIKARI CONNECTION POOL
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# FILE UPLOAD
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads/images

# LOGGING
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# JACKSON (JSON)
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# JWT
app.jwt.secret=3D7F2A9C1E6B4F8D0A5C3E7F9B1D4A6C8E0F2B4D6A8C0E2F4B6D8A0C2E4F6B8
app.jwt.expiration-ms=86400000

# ACTUATOR
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# RESILIENCE4J
resilience4j.timelimiter.instances.default.timeout-duration=2s
resilience4j.retry.instances.default.max-attempts=3
resilience4j.retry.instances.default.wait-duration=100ms
resilience4j.circuitbreaker.instances.default.sliding-window-size=10
resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50